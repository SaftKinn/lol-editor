# LoL Editor configuration — copy to "config/config.toml" and adjust.
# Paths and settings are config, never hardcoded in source.

[paths]
input_dir = "input"     # raw gameplay videos
music_dir = "music"     # royalty-free music tracks
output_dir = "output"   # finished videos
assets_dir = "assets"   # optional intro.mp4 / outro.mp4 / logo.png

[llm]
# Stage 5 (discovery): the ONLY paid/cloud part of the pipeline (ADR 0001). The LLM
# writes English metadata (titles/tags/descriptions) + the thumbnail text. All math,
# timings and frame grabs stay in code — the LLM never touches them.
model = "claude-sonnet-4-6"   # cheap default; "claude-opus-4-8" for quality runs
max_tokens = 2000             # plenty for two surfaces of metadata
# The API key is read from this environment variable (kept out of git this way).
api_key_env = "ANTHROPIC_API_KEY"
# Optional: path to a KEY=VALUE ".env" file to read the key from when the env var is
# NOT already set. Lets you reuse a key stored elsewhere without copying it into git.
# e.g. env_file = "C:/Users/you/Desktop/SocialMedia Projekt/.env"
env_file = ""

[thumbnail]
# Stage 5: a thumbnail = a still grabbed from the master video (deterministic, FFmpeg)
# + bold overlay text written by the LLM. The still is taken at this fraction of the
# clip's duration, then scaled to a standard 1280x720 YouTube thumbnail.
frame_at = 0.5            # 0..1 position in the clip to grab the still from
font = "C:/Windows/Fonts/arialbd.ttf"   # a TrueType font file on disk (Arial Bold)
font_size = 96
font_color = "white"
box_color = "black@0.5"   # semi-transparent box behind the text for legibility

[presets]
# A preset = an input sub-folder + a matching music pool. Drop a clip in
# input/<preset>/ and it is scored from music/<preset>/ automatically. List the
# preset names you use. A clip placed directly in input/ (no sub-folder) draws
# from the top-level music/ folder. Track choice within a pool is deterministic
# per clip (re-runnable), so the same clip always gets the same track.
names = ["hype", "funny"]

[batch]
# Stage 6: process every clip in a preset folder in one run (the daily-volume engine).
# Each clip -> a 16:9 master (edit, + branding if assets exist) and optionally a Short.
make_shorts = true     # also cut a 9:16 Short from each master
make_metadata = true   # also write English metadata + a thumbnail (Stage 5, needs an API key)
montage = false        # after processing, also stitch the folder's clips into one montage

[montage]
# Stage 4: stitch several clips into one long-form video (the higher-CPM format).
# music_bed = lay ONE royalty-free track (picked by the clips' preset pool) under
# the whole montage, ducked + normalized like the core edit, so the audio stays
# consistent across cuts. false = keep each clip's own audio untouched.
music_bed = true

[shorts]
# Stage 3: reframe a 16:9 edit to a 9:16 vertical Short with a blurred-background
# fit — the full game frame stays visible (HUD/minimap never cropped, ADR 0005),
# with the top/bottom filled by a blurred, enlarged copy of the same frame.
resolution = "1080x1920"   # 9:16 target, "width x height"
blur = 20                  # background blur strength (gblur sigma); higher = softer

[audio]
# Background music level under the gameplay (0..1). 0.15-0.20 sits the music
# clearly behind the game audio.
music_volume = 0.18
# Auto-lower the music when game audio is loud (kills, pings, fights), so the
# action always sits on top. Uses FFmpeg sidechain compression.
duck_music = true
# Normalize the final mix to YouTube's reference loudness (LUFS). -14 is standard.
target_loudness = -14

[video]
# Re-encode settings. Leave resolution = "" and fps = 0 to KEEP the source video
# untouched (the video stream is copied, not re-encoded — lossless and much faster;
# only the audio is rebuilt). Set them to force a specific size/framerate.
resolution = ""         # "" = keep source; e.g. "1920x1080"
fps = 0                 # 0 = keep source; e.g. 60
crf = 18                # quality if re-encoding (lower = better; 18 ≈ visually lossless)
preset = "medium"       # x264 speed/quality tradeoff

[branding]
# Stage 2: prepend an intro, append an outro, overlay a corner logo throughout.
# All optional and config-driven — file names are looked up in assets_dir; leave
# "" to skip that piece. Branding re-encodes (concat + overlay), using the [video]
# encoder settings below.
intro = ""              # e.g. "intro.mp4"  (prepended)
outro = ""              # e.g. "outro.mp4"  (appended)
logo = ""               # e.g. "logo.png"   (overlaid the whole time; "" = no logo)
logo_corner = "top-right"   # top-left | top-right | bottom-left | bottom-right
logo_margin = 24        # pixels from the frame edges
logo_width = 160        # logo is scaled to this width in px (height keeps aspect)
logo_opacity = 1.0      # 0..1 (1 = solid, lower = more transparent watermark)
